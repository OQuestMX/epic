<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Quest — Clases</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf8;--bg2:#f0efeb;--bg3:#e5e3dd;--ink:#1a1a1a;--ink2:#555;--ink3:#999;--accent:#6b4c1e;--accent2:#8b6914;--green:#2d6a2d;--red:#9b2020;--blue:#2a5a8a;--purple:#5a3a8a;--orange:#7a5a1a;--border:#ddd8ce;--radius:6px;--font:'Segoe UI',system-ui,-apple-system,sans-serif}
body{font-family:var(--font);font-size:14px;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;min-height:42px;flex-wrap:wrap}
.topbar h1{font-size:14px;font-weight:700;color:var(--accent)}
.dd{width:7px;height:7px;border-radius:50%;background:var(--red);display:none}.dd.show{display:block}
.spacer{flex:1}
.pw{display:flex;align-items:center;gap:5px}.pb{width:80px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}.pfill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}.ptxt{font-size:10px;color:var(--ink3)}
.btn{padding:4px 9px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--ink);font-size:10px;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.sm{padding:3px 7px;font-size:10px}.btn.danger{color:var(--red);border-color:var(--red)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:12px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:999;pointer-events:none}.toast.show{opacity:1;transform:translateY(0)}
.layout{display:flex;flex:1;overflow:hidden}
.left{width:250px;min-width:250px;border-right:1px solid var(--border);background:#fff;display:flex;flex-direction:column}
.sb{padding:6px;border-bottom:1px solid var(--border)}.sb input{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;font-family:var(--font);outline:none}.sb input:focus{border-color:var(--accent)}
.ls{flex:1;overflow-y:auto}.ls::-webkit-scrollbar{width:5px}.ls::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.la{padding:6px;border-top:1px solid var(--border)}
.sl{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--ink3);padding:10px 10px 3px;text-transform:uppercase}
.ci{display:flex;align-items:center;gap:5px;padding:5px 10px;cursor:pointer;border-left:3px solid transparent;transition:all .1s}.ci:hover{background:var(--bg2)}.ci.active{background:var(--bg2);border-left-color:var(--accent)}
.ci .ic{font-size:14px;width:18px;text-align:center}.ci .nm{flex:1;font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci .pc{font-size:9px;color:var(--ink3)}.ci .pc.full{color:var(--green);font-weight:700}
.ci .ck{width:13px;height:13px;border:2px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;cursor:pointer}.ci .ck.done{background:var(--green);border-color:var(--green)}
.si{padding-left:30px}.si .nm{font-size:10px;color:var(--ink2)}
.right{flex:1;overflow-y:auto;padding:16px 24px;background:var(--bg);position:relative}.right::-webkit-scrollbar{width:7px}.right::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.ch{margin-bottom:14px}.meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.cicon{font-size:26px}
.editable{border:1px solid transparent;border-radius:3px;padding:1px 3px;outline:none}.editable:hover{border-color:var(--bg3)}.editable:focus{border-color:var(--accent);background:#fff}
.cne{font-size:20px;font-weight:700}
.tbg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.type-fuerza{background:#f3e8d4;color:#6b4c1e}.type-magia{background:#e0d8f0;color:#4a3a7a}
.fr{display:flex;gap:6px;align-items:center;margin:2px 0;font-size:11px}.fl{font-weight:600;color:var(--ink2);min-width:65px;font-size:10px}.fv{flex:1}
.tbar{display:flex;gap:5px;margin:8px 0 6px;flex-wrap:wrap}
.ac{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;border-left:3px solid var(--border)}
.ac.t-base{border-left-color:var(--green)}.ac.t-pasiva-corta{border-left-color:var(--blue)}.ac.t-pasiva-de-concentracion{border-left-color:var(--purple)}.ac.t-activa{border-left-color:var(--orange)}.ac.t-reactiva{border-left-color:var(--red)}.ac.t-heroica{border-left-color:#8a2a5a}
.ah{display:flex;align-items:center;gap:5px;padding:7px 9px;border-bottom:1px solid var(--bg3);cursor:pointer;user-select:none}.ah:hover{background:var(--bg2)}
.an{font-size:12px;font-weight:600;flex:1}
.ah .db{opacity:0;transition:opacity .15s;font-size:12px;color:var(--ink3);cursor:pointer;padding:0 3px}.ah:hover .db{opacity:.5}.ah .db:hover{opacity:1;color:var(--red)}
.at{width:100%;border-collapse:collapse;font-size:10px}.at th{background:var(--bg2);padding:4px 5px;text-align:left;font-weight:600;font-size:9px;color:var(--ink2);border:1px solid var(--border);white-space:nowrap}
.at td{padding:3px 5px;border:1px solid var(--border);vertical-align:top}
.at td.pl{font-weight:600;color:var(--accent);white-space:nowrap;width:68px;font-size:9px}
.at td.num{width:40px;text-align:center;font-size:10px;cursor:text;background:#fefef8}.at td.num:hover{background:#fffbe8}.at td.num:focus{background:#fff8d0;outline:2px solid var(--accent)}
.at td.echo-c{width:50px;font-size:10px;cursor:text;background:#fefef8}.at td.echo-c:hover{background:#fffbe8}.at td.echo-c:focus{background:#fff8d0;outline:2px solid var(--accent)}
.at td.rc{min-width:100px;font-size:10px;line-height:1.4;cursor:pointer;background:#fefef8}.at td.rc:hover{background:#fffbe8}
.at td.ro{min-width:100px;font-size:10px;line-height:1.4;background:#fff}
.ab{padding:8px}.ad{font-size:10px;color:var(--ink2);margin-bottom:5px;font-style:italic}
.ta{font-size:10px;color:var(--ink3);transition:transform .2s;width:12px;text-align:center}.ta.open{transform:rotate(90deg)}
.addb{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--ink3);font-size:10px;cursor:pointer;margin-top:5px;font-family:var(--font)}.addb:hover{border-color:var(--accent);color:var(--accent)}
select.ts{font-size:9px;padding:2px 3px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--ink2);cursor:pointer;font-family:var(--font)}
.es{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink3);font-size:14px;flex-direction:column;gap:6px}
.hidden{display:none}
.cell-tag{display:inline-block;font-size:9px;padding:1px 4px;border-radius:3px;margin:1px;white-space:nowrap}
.cell-tag.dmg{background:#fce4e4;color:#8b2020}.cell-tag.cond{background:#e0e8f8;color:#2a4a8a}.cell-tag.eff{background:#e8f0e0;color:#3a6a1a}.cell-tag.dbk{background:#f0e0e8;color:#7a2a5a}
.popup-overlay{position:fixed;inset:0;z-index:900}.popup{position:fixed;z-index:901;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.15);padding:12px;width:340px;max-height:400px;overflow-y:auto;font-size:11px}
.popup h4{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px}
.popup label{font-size:10px;font-weight:600;color:var(--ink2);display:block;margin:6px 0 2px}
.popup input[type=text]{width:100%;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:var(--font);outline:none}.popup input:focus{border-color:var(--accent)}
.popup .tag-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;min-height:22px}
.popup .tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px}.popup .tag.cond{background:#e0e8f8;color:#2a4a8a}.popup .tag.eff{background:#e8f0e0;color:#3a6a1a}.popup .tag.dbk{background:#f0e0e8;color:#7a2a5a}
.popup .tag .x{cursor:pointer;opacity:.5;font-size:12px}.popup .tag .x:hover{opacity:1}
.popup .cond-grid{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.popup .cond-btn{font-size:9px;padding:2px 7px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;font-family:var(--font)}.popup .cond-btn:hover{border-color:var(--blue)}.popup .cond-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.popup .add-row{display:flex;gap:4px;margin-top:3px}.popup .add-row input{flex:1}.popup .add-row button{padding:3px 8px;font-size:10px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);cursor:pointer;font-family:var(--font)}
@media print{.topbar,.left,.tbar,.addb,.ah .db,.btn,.popup,.popup-overlay,.la,.sb{display:none !important}.layout{display:block !important}.right{overflow:visible !important;padding:10px !important}.ac{break-inside:avoid}}</style>
</head>
<body>
<div class="topbar">
  <h1>Epic Quest — Clases</h1>
  <span class="mode-badge mode-wiki" id="mode-badge">Wiki</span>
  <span class="dd" id="dd"></span>
  <div class="pw"><div class="pb"><div class="pfill" id="pf"></div></div><span class="ptxt" id="pt"></span></div>
  <div class="spacer"></div>
  <a href="index.html" class="btn sm">◀ Wiki</a>
  <button class="btn sm" onclick="toggleMode()" id="mode-btn">✏ Editar</button>
  <span id="toolbar-edit" style="display:none">
    <button class="btn sm" onclick="undo()">↩</button>
    <button class="btn sm" onclick="exJSON()">↓ data.json</button>
    <button class="btn sm" onclick="document.getElementById('ijf').click()">↑ JSON</button>
    <button class="btn sm" onclick="exMD()">↓ MD</button>
    <button class="btn sm" onclick="document.getElementById('imf').click()">↑ MD</button>
    <button class="btn sm danger" onclick="resetD()">Reset</button>
  </span>
  <input type="file" id="ijf" class="hidden" accept=".json" onchange="imJSON(event)">
  <input type="file" id="imf" class="hidden" accept=".md,.markdown,.txt" onchange="imMD(event)">
</div>
<div class="layout">
  <div class="left">
    <div class="sb"><input type="text" id="si" placeholder="Buscar..."></div>
    <div class="ls" id="ls"></div>
    <div class="la" id="la-add" style="display:none"><button class="btn sm" style="width:100%" onclick="addCls()">+ Nueva clase</button></div>
  </div>
  <div class="right" id="rp"><div class="es">Cargando...</div></div>
</div>
<div class="toast" id="toast"></div>
<div class="popup-overlay" id="popoverlay" style="display:none" onclick="closePopup()"></div>
<div class="popup" id="popup" style="display:none"></div>
<script>
var mode='wiki';
var state=null,origData=null,selId=null,selType=null,selPid=null,isDirty=false,sq='',undoS=[],popupData=null;
var TYPES=['Base','Pasiva corta','Pasiva de concentración','Activa','Reactiva','Heroica'];
var CONDS=['Derribado','Aturdido','Ralentizado','Inmovilizado','Asustado','Incapacitado','Aterrorizado','Desconcentrado','Desarmado','Marcado','Invisible','Congelado'];
var ASK='eq_v5',PASS='12345';

function init(){
  var saved=localStorage.getItem(ASK);
  if(saved){try{state=JSON.parse(saved);origData=JSON.stringify(state);toast('Restaurado');startApp();return}catch(e){}}
  fetch('data.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){state=d;origData=JSON.stringify(d);startApp()}).catch(function(){
    document.getElementById('rp').innerHTML='<div class="es">No se pudo cargar data.json<br><span style="font-size:10px">Aseg\u00FArate de estar en GitHub Pages o un servidor local</span></div>';
  });
}
function startApp(){rl();rr();uC();updateToolbar()}
function sv(){undoS.push(JSON.stringify(state));if(undoS.length>30)undoS.shift()}
function mk(){isDirty=true;document.getElementById('dd').classList.add('show');try{localStorage.setItem(ASK,JSON.stringify(state))}catch(e){}}
function undo(){if(!undoS.length)return toast('Nada');state=JSON.parse(undoS.pop());rl();rr();mk();toast('Deshecho')}
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show')},2000)}
function toggleMode(){if(mode==='wiki'){var p=prompt('Password:');if(p!==PASS)return toast('Incorrecto');mode='edit';toast('Editor activado')}else{mode='wiki';closePopup();toast('Modo wiki')}updateToolbar();rl();rr()}
function updateToolbar(){var tb=document.getElementById('toolbar-edit'),mb=document.getElementById('mode-badge'),la=document.getElementById('la-add'),mbtn=document.getElementById('mode-btn');if(mode==='edit'){if(tb)tb.style.display='';if(mb){mb.className='mode-badge mode-edit';mb.textContent='Editor'}if(la)la.style.display='';if(mbtn)mbtn.textContent='\u25C0 Wiki'}else{if(tb)tb.style.display='none';if(mb){mb.className='mode-badge mode-wiki';mb.textContent='Wiki'}if(la)la.style.display='none';if(mbtn)mbtn.textContent='\u270F Editar'}}
function cellText(cell){if(!cell||typeof cell==='string')return cell||'';var p=[];if(cell.d)p.push(cell.d+' da\u00F1o');if(cell.c&&cell.c.length)cell.c.forEach(function(x){p.push(x.toLowerCase())});if(cell.e&&cell.e.length)cell.e.forEach(function(x){p.push(x)});if(cell.db&&cell.db.length)cell.db.forEach(function(x){p.push(x)});return p.join(', ')}
function cellHtml(cell){if(!cell)return'';if(typeof cell==='string')return cell;var h='';if(cell.d)h+='<span class="cell-tag dmg">'+cell.d+' dmg</span>';if(cell.c)cell.c.forEach(function(x){h+='<span class="cell-tag cond">'+x+'</span>'});if(cell.e)cell.e.forEach(function(x){h+='<span class="cell-tag eff">'+x+'</span>'});if(cell.db)cell.db.forEach(function(x){h+='<span class="cell-tag dbk">'+x+'</span>'});return h||'<span style="color:#e5e3dd;font-style:italic">...</span>'}
function isEmpty(cell){if(!cell)return true;if(typeof cell==='string')return!cell;return!cell.d&&(!cell.c||!cell.c.length)&&(!cell.e||!cell.e.length)&&(!cell.db||!cell.db.length)}
function cCo(c){var t=0,f=0;c.abilities.forEach(function(a){a.table.forEach(function(r){for(var i=3;i<6;i++){t++;if(!isEmpty(r[i]))f++}})});return{t:t,f:f}}
function gRC(){var t=0,r=0;state.classes.forEach(function(c){t++;if(c.ready)r++;c.subclasses.forEach(function(s){t++;if(s.ready)r++})});return{t:t,r:r}}
function uC(){if(!state)return;var r=gRC();document.getElementById('pt').textContent=r.r+'/'+r.t;document.getElementById('pf').style.width=(r.t?Math.round(r.r/r.t*100):0)+'%'}
function rl(){if(!state)return;var el=document.getElementById('ls'),h='',tp={Fuerza:[],Magia:[]};state.classes.forEach(function(c){(tp[c.type]||tp.Fuerza).push(c)});var q=sq.toLowerCase();['Fuerza','Magia'].forEach(function(type){var cls=tp[type].filter(function(c){if(!q)return true;return c.name.toLowerCase().indexOf(q)>=0||c.subclasses.some(function(s){return s.name.toLowerCase().indexOf(q)>=0})});if(!cls.length)return;h+='<div class="sl">'+type+'</div>';cls.forEach(function(c){var a=selType==='class'&&selId===c.id,cp=cCo(c),pp=cp.t?Math.round(cp.f/cp.t*100):0;h+='<div class="ci'+(a?' active':'')+'" onclick="selC(\''+c.id+'\')"><span class="ic">'+c.icon+'</span><span class="nm">'+c.name+'</span>';if(mode==='edit')h+='<span class="pc'+(pp===100?' full':'')+'">'+pp+'%</span>';if(mode==='edit')h+='<span class="ck'+(c.ready?' done':'')+'" onclick="event.stopPropagation();tR(\''+c.id+'\')">'+(c.ready?'\u2713':'')+'</span>';h+='</div>';c.subclasses.forEach(function(s){if(q&&s.name.toLowerCase().indexOf(q)<0&&c.name.toLowerCase().indexOf(q)<0)return;var sa=selType==='subclass'&&selId===s.id;h+='<div class="ci si'+(sa?' active':'')+'" onclick="selS(\''+c.id+'\',\''+s.id+'\')"><span class="ic" style="font-size:9px">\u2514</span><span class="nm">'+s.name+'</span>';if(mode==='edit')h+='<span class="ck'+(s.ready?' done':'')+'" onclick="event.stopPropagation();tSR(\''+c.id+'\',\''+s.id+'\')">'+(s.ready?'\u2713':'')+'</span>';h+='</div>'})})});el.innerHTML=h;uC()}
function selC(id){selId=id;selType='class';selPid=null;rl();rr()}
function selS(pid,id){selId=id;selType='subclass';selPid=pid;rl();rr()}
function tR(id){sv();var c=state.classes.find(function(x){return x.id===id});if(c)c.ready=!c.ready;rl();mk()}
function tSR(cid,sid){sv();var c=state.classes.find(function(x){return x.id===cid});if(c){var s=c.subclasses.find(function(x){return x.id===sid});if(s)s.ready=!s.ready}rl();mk()}
function addCls(){sv();var id='c_'+Date.now();state.classes.push({id:id,name:'Nueva Clase',icon:'\u26A1',type:'Fuerza',resource:'',resourceDesc:'',fantasy:'',ready:false,abilities:[],subclasses:[]});selId=id;selType='class';selPid=null;rl();rr();mk();toast('Creada')}
function addSub(){if(selType!=='class')return;sv();var c=state.classes.find(function(x){return x.id===selId});if(!c)return;var sid='s_'+Date.now();c.subclasses.push({id:sid,name:'Nueva Subclase',ready:false,fantasy:'',abilities:[]});selId=sid;selType='subclass';selPid=c.id;rl();rr();mk();toast('Subclase creada')}
function delSel(){if(!selId)return;var nm='';if(selType==='class'){var c=state.classes.find(function(x){return x.id===selId});nm=c?c.name:''}else{var p=state.classes.find(function(x){return x.id===selPid});if(p){var s=p.subclasses.find(function(x){return x.id===selId});nm=s?s.name:''}}if(!confirm('Eliminar "'+nm+'"?'))return;sv();if(selType==='class')state.classes=state.classes.filter(function(x){return x.id!==selId});else{var p=state.classes.find(function(x){return x.id===selPid});if(p)p.subclasses=p.subclasses.filter(function(x){return x.id!==selId})}selId=null;selType=null;rl();rr();mk();toast('Eliminado')}
function delA(cid,sid,idx){var a=gA(cid,sid);if(!a||!a[idx])return;if(!confirm('Eliminar "'+a[idx].name+'"?'))return;sv();a.splice(idx,1);rr();mk()}
function dupA(cid,sid,idx){var a=gA(cid,sid);if(!a||!a[idx])return;sv();var cp=JSON.parse(JSON.stringify(a[idx]));cp.name+=' (copia)';a.splice(idx+1,0,cp);rr();mk();toast('Duplicada')}
function buildCostStr(aen,echo){var s='';if(aen)s+=aen+' Aen';if(echo){if(s)s+=' + ';s+='Echo';if(echo==='alto')s+=' alto';else if(echo==='m\u00E1x'||echo==='max')s+=' m\u00E1x';else if(echo==='concentrado')s+=' concentrado'}return s}
function eRow(){return{d:'',c:[],e:[],db:[]}}
function rTbl(ab,cid,sid,ai){var px=sid?cid+'.'+sid:cid;var ed=mode==='edit';var h='<table class="at"><thead><tr><th>Plano</th><th>Aen</th><th>Echo</th><th>1-4</th><th>5-8</th><th>9-12</th></tr></thead><tbody>';ab.table.forEach(function(r,ri){h+='<tr><td class="pl">'+r[0]+'</td>';if(ed){h+='<td class="num" contenteditable="true" data-p="'+px+'" data-a="'+ai+'" data-r="'+ri+'" data-c="1" onblur="uNum(this)">'+(r[1]||'')+'</td>';h+='<td class="echo-c" contenteditable="true" data-p="'+px+'" data-a="'+ai+'" data-r="'+ri+'" data-c="2" onblur="uNum(this)">'+(r[2]||'')+'</td>'}else{h+='<td colspan="2" style="font-size:10px">'+buildCostStr(r[1],r[2])+'</td>'}for(var ci=3;ci<6;ci++){var cell=r[ci];if(ed){h+='<td class="rc" onclick="openPopup(this,\''+px+'\','+ai+','+ri+','+ci+')">'+cellHtml(cell)+'</td>'}else{h+='<td class="ro">'+cellHtml(cell)+'</td>'}}h+='</tr>'});return h+'</tbody></table>'}
function uNum(el){var p=el.dataset.p.split('.'),ai=+el.dataset.a,ri=+el.dataset.r,ci=+el.dataset.c,v=el.textContent.trim();var ab=getAb(p);if(ab&&ab[ai]){var old=ab[ai].table[ri][ci];if(old!==v){sv();ab[ai].table[ri][ci]=v;mk()}}}
